name: Release · npm (skillfed + skillfed-mcp)

# Publishes the two npm packages: `skillfed` (installer/) and `skillfed-mcp` (mcp-server/).
#
# Tokenless via OIDC Trusted Publishing. v0.1.0 was bootstrapped with a one-shot bypass-2FA
# token (since npm only allows configuring a Trusted Publisher AFTER a package's first version —
# https://docs.npmjs.com/trusted-publishers/); that token has been removed. Both `skillfed` and
# `skillfed-mcp` now have a GitHub Actions trusted publisher registered for this workflow, so no
# secret is needed and provenance is signed automatically.
#
# Requires npm ≥ 11.5.1 (installed below) and id-token: write.
# Trigger: push a version tag (v0.2.0, …) or run manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # signs provenance attestations (and OIDC once TP is configured)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Upgrade npm (Trusted Publishing needs ≥ 11.5.1)
        run: npm install -g npm@latest

      # `npm publish` in installer/ runs its prepack -> scripts/vendor-payload.mjs, so the
      # payload is vendored into the tarball automatically. OIDC handles auth + provenance.
      - name: Publish skillfed (installer/)
        working-directory: installer
        run: npm publish --access public

      - name: Publish skillfed-mcp (mcp-server/)
        working-directory: mcp-server
        run: npm publish --access public
