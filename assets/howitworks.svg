<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 380" width="820" height="380"
     role="img" aria-label="How Skill Federation works: on your machine the agent approves a plan and writes abstract wishes; only the abstract wish crosses the boundary to the federation, which returns ranked candidates; you approve, the skill installs to .claude/skills, and the agent uses it. Your plan, files, and outputs never leave your machine.">
  <title>How it works — only the abstract wish crosses the boundary</title>
  <desc>A flow diagram split by a dashed boundary. Left ("Your machine"): Approve a plan, then Agent writes abstract wishes. A single arrow labeled "only the abstract wish" crosses to the right ("Federation"), which runs a lexical search over vetted skills and returns ranked candidates. Back on the left: Trust review (you approve), then Install to .claude/skills and use the skill. A pinned note states your plan, files, and outputs never leave your machine.</desc>

  <style>
    .sans { font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
    .ink { fill: #1E1B16; } .soft { fill: #4F493F; } .muted { fill: #8A8377; }
    .node { fill: #FFFFFF; stroke: #1E1B16; stroke-opacity: 0.14; }
    .in { opacity: 0; animation: fade .5s ease forwards; }
    .d1{animation-delay:.05s}.d2{animation-delay:.18s}.d3{animation-delay:.34s}
    .d4{animation-delay:.5s}.d5{animation-delay:.64s}.d6{animation-delay:.78s}
    @keyframes fade { to { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { .in { animation: none; opacity: 1; } }
  </style>

  <defs>
    <marker id="av" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#1E1B16" fill-opacity="0.55"/>
    </marker>
    <marker id="aw" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#7C5CDB"/>
    </marker>
    <marker id="am" markerWidth="9" markerHeight="9" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8A8377"/>
    </marker>
  </defs>

  <!-- card -->
  <rect x="6" y="6" width="808" height="368" rx="18" fill="#F7F3EB" stroke="#1E1B16" stroke-opacity="0.14"/>

  <!-- header -->
  <text x="32" y="44" class="sans ink" font-size="19" font-weight="700">How it works</text>
  <text x="32" y="66" class="sans muted" font-size="12">Only the abstract wish crosses the boundary — your plan, files, and outputs never leave.</text>

  <!-- zones -->
  <rect x="556" y="92" width="232" height="180" rx="16" fill="#7C5CDB" fill-opacity="0.06"/>
  <text x="40"  y="104" class="sans muted" font-size="11" font-weight="700" letter-spacing="1.5">YOUR MACHINE</text>
  <text x="572" y="104" class="sans" font-size="11" font-weight="700" letter-spacing="1.5" fill="#7C5CDB">FEDERATION</text>

  <!-- boundary -->
  <line x1="540" y1="92" x2="540" y2="346" stroke="#7C5CDB" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="5 6"/>

  <!-- left flow: nodes -->
  <g class="sans">
    <!-- N1 -->
    <g class="in d1">
      <rect class="node" x="40" y="116" width="250" height="40" rx="12"/>
      <circle cx="64" cy="136" r="10" fill="#7C5CDB" fill-opacity="0.14"/>
      <text x="64" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#7C5CDB">1</text>
      <text x="84" y="140" class="ink" font-size="13.5" font-weight="600">Approve a plan</text>
    </g>
    <!-- N2 -->
    <g class="in d2">
      <rect class="node" x="40" y="162" width="250" height="40" rx="12"/>
      <circle cx="64" cy="182" r="10" fill="#7C5CDB" fill-opacity="0.14"/>
      <text x="64" y="186" text-anchor="middle" font-size="12" font-weight="700" fill="#7C5CDB">2</text>
      <text x="84" y="186" class="ink" font-size="13.5" font-weight="600">Agent writes abstract wishes</text>
    </g>
    <!-- N3 review -->
    <g class="in d5">
      <rect class="node" x="40" y="246" width="250" height="40" rx="12"/>
      <circle cx="64" cy="266" r="10" fill="#7C5CDB" fill-opacity="0.14"/>
      <text x="64" y="270" text-anchor="middle" font-size="12" font-weight="700" fill="#7C5CDB">4</text>
      <text x="84" y="270" class="ink" font-size="13.5" font-weight="600">Trust review — you approve</text>
    </g>
    <!-- N4 install+use -->
    <g class="in d6">
      <rect class="node" x="40" y="292" width="250" height="40" rx="12"/>
      <circle cx="64" cy="312" r="10" fill="#7C5CDB" fill-opacity="0.14"/>
      <text x="64" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#7C5CDB">5</text>
      <text x="84" y="316" class="ink" font-size="13.5" font-weight="600">Install → use the skill</text>
    </g>
  </g>

  <!-- federation node (right) -->
  <g class="sans in d3">
    <rect x="572" y="170" width="200" height="64" rx="14" fill="#FFFFFF" stroke="#7C5CDB" stroke-opacity="0.55"/>
    <circle cx="600" cy="202" r="11" fill="#7C5CDB" fill-opacity="0.14"/>
    <text x="600" y="206" text-anchor="middle" font-size="12" font-weight="700" fill="#7C5CDB">3</text>
    <text x="620" y="198" class="ink" font-size="13.5" font-weight="700">Federation match</text>
    <text x="620" y="216" class="muted" font-size="11">lexical search · vetted skills</text>
  </g>

  <!-- arrows: N1 -> N2 (down) -->
  <line x1="165" y1="156" x2="165" y2="160" stroke="#1E1B16" stroke-opacity="0.55" marker-end="url(#av)"/>
  <!-- N2 -> Federation (crosses boundary) -->
  <path class="in d3" d="M290,180 C420,180 470,202 570,202" fill="none" stroke="#7C5CDB" stroke-width="1.6" marker-end="url(#aw)"/>
  <text x="404" y="172" text-anchor="middle" class="sans in d3" font-size="11.5" font-weight="700" fill="#7C5CDB">only the abstract wish</text>
  <!-- Federation -> Review (back across boundary) -->
  <path class="in d4" d="M572,224 C470,244 400,250 292,260" fill="none" stroke="#8A8377" stroke-width="1.4" stroke-dasharray="0" marker-end="url(#am)"/>
  <text x="404" y="244" text-anchor="middle" class="sans in d4" font-size="11" fill="#8A8377">ranked candidates</text>
  <!-- Review -> Install (down) -->
  <line x1="165" y1="286" x2="165" y2="290" stroke="#1E1B16" stroke-opacity="0.55" marker-end="url(#av)"/>

  <!-- privacy chip (pinned local) -->
  <g class="in d6">
    <rect x="40" y="344" width="262" height="24" rx="12" fill="#2E9E6B" fill-opacity="0.10"/>
    <circle cx="56" cy="356" r="3.2" fill="#2E9E6B"/>
    <text x="68" y="360" class="sans" font-size="11.5" font-weight="600" fill="#2E7D57">your plan · files · outputs never leave</text>
  </g>
</svg>
