<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 320" width="660" height="320"
     role="img" aria-label="SkillsBench task success rate: no skill 17.5 percent, Skill Federation 22.8 percent, oracle skill 36.8 percent (an unreachable upper bound)">
  <title>SkillsBench — task success rate</title>
  <desc>Horizontal bar chart. A bare agent solves 17.5% of SkillsBench tasks; with Skill Federation, 22.8% (a roughly 30% relative gain); an oracle given the task's own hand-written skill reaches 36.8%, shown as an unreachable upper bound. Agent: Claude Code (Opus 4.6); skills retrieved from a 26,629-skill snapshot with the benchmark's own answer skills removed.</desc>

  <style>
    .sans { font-family: 'Plus Jakarta Sans', ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    .ink { fill: #1E1B16; } .soft { fill: #4F493F; } .muted { fill: #8A8377; }
    .grow { transform-box: fill-box; transform-origin: left center; animation: grow 1.1s cubic-bezier(.22,1,.36,1) forwards; }
    @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    .b2 { animation-delay: .12s; } .b3 { animation-delay: .24s; }
    .val { opacity: 0; animation: fade .5s ease forwards; }
    .v1 { animation-delay: .7s; } .v2 { animation-delay: .85s; } .v3 { animation-delay: 1s; }
    @keyframes fade { to { opacity: 1; } }
  </style>

  <!-- card -->
  <rect x="6" y="6" width="648" height="308" rx="18" fill="#F7F3EB" stroke="#1E1B16" stroke-opacity="0.14"/>

  <!-- titles -->
  <text x="32" y="44" class="sans ink" font-size="19" font-weight="700">SkillsBench — task success rate</text>
  <text x="32" y="66" class="sans muted" font-size="12">Claude Code (Opus 4.6) · skills retrieved from a 26,629-skill snapshot, answer skills removed</text>

  <!-- baseline gridline at x=210 .. x=620 (range 0 .. 40%) -->
  <line x1="210" y1="92" x2="210" y2="270" stroke="#1E1B16" stroke-opacity="0.18"/>

  <!-- Bar 1: No skill — 17.5% (scale 10.25 px per %, 40% full = 410px) -->
  <text x="194" y="123" text-anchor="end" class="sans soft" font-size="14">No skill</text>
  <rect class="grow" x="210" y="106" width="179" height="30" rx="6" fill="#C9C4BA"/>
  <text class="sans ink val v1" x="399" y="126" font-size="14" font-weight="700">17.5%</text>

  <!-- Bar 2: Skill Federation — 22.8% (highlight) -->
  <text x="194" y="173" text-anchor="end" class="sans ink" font-size="14" font-weight="700">Skill Federation</text>
  <rect class="grow b2" x="210" y="156" width="234" height="30" rx="6" fill="#7C5CDB"/>
  <text class="sans val v2" x="454" y="176" font-size="14" font-weight="700" fill="#7C5CDB">22.8%</text>

  <!-- Bar 3: Oracle — 36.8% (ghosted ceiling) -->
  <text x="194" y="223" text-anchor="end" class="sans muted" font-size="14">Oracle</text>
  <rect class="grow b3" x="210" y="206" width="377" height="30" rx="6" fill="#7C5CDB" fill-opacity="0.22"
        stroke="#7C5CDB" stroke-opacity="0.5" stroke-dasharray="4 4"/>
  <text class="sans val v3 soft" x="597" y="226" font-size="14" font-weight="700">36.8%</text>
  <text class="sans val v3 muted" x="214" y="226" font-size="11.5">unreachable upper bound</text>

  <!-- caption -->
  <text x="32" y="296" class="sans soft" font-size="13">
    <tspan font-weight="700" fill="#7C5CDB">+30% relative</tspan> over the bare agent — recovering ~27% of the gap to an oracle skill it never sees.
  </text>
</svg>
